<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deepfake Audio Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            text-align: center;
            padding: 40px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎧 Deepfake Audio Detection</h1>

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="audio" accept=".wav" required>
        <br>
        <button type="submit">Analyze Audio</button>
    </form>

</body>
</html>
